<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Ketersediaan Barang</title>
    <style>
      :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --danger: #dc2626;
        --danger-hover: #b91c1c;
        --bg-color: #f3f4f6;
        --card-bg: #ffffff;
        --text-main: #1f2937;
        --border-color: #e5e7eb;
        --critical-bg: #fee2e2;
        --critical-text: #991b1b;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        padding: 20px;
        line-height: 1.5;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        background: var(--card-bg);
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 10px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
        align-items: end;
      }

      .input-group {
        display: flex;
        flex-direction: column;
      }

      label {
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 4px;
        color: #4b5563;
      }

      input[type="text"],
      input[type="number"] {
        padding: 8px 12px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        font-size: 1rem;
        width: 100%;
        transition: border-color 0.2s;
      }

      input[type="text"]:focus,
      input[type="number"]:focus {
        outline: none;
        border-color: var(--primary);
      }

      button {
        padding: 10px 16px;
        border: none;
        border-radius: 4px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        color: white;
        font-size: 0.875rem;
      }

      .btn-primary {
        background-color: var(--primary);
      }
      .btn-primary:hover {
        background-color: var(--primary-hover);
      }

      .btn-danger {
        background-color: var(--danger);
        padding: 6px 12px;
      }
      .btn-danger:hover {
        background-color: var(--danger-hover);
      }

      .btn-secondary {
        background-color: #6b7280;
      }
      .btn-secondary:hover {
        background-color: #4b5563;
      }

      #error-msg {
        display: none;
        background-color: var(--critical-bg);
        color: var(--critical-text);
        padding: 10px;
        border-radius: 4px;
        margin-bottom: 16px;
        font-size: 0.875rem;
      }

      .table-responsive {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid var(--border-color);
      }

      th {
        background-color: #f9fafb;
        font-weight: 600;
        color: #4b5563;
      }

      td input[type="number"] {
        width: 80px;
        padding: 4px 8px;
      }

      tr.critical-stock {
        background-color: var(--critical-bg);
      }
      tr.critical-stock td {
        color: var(--critical-text);
        font-weight: 600;
      }

      .total-col {
        font-weight: bold;
        font-size: 1.1rem;
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }

      .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-content {
        background: white;
        padding: 24px;
        border-radius: 8px;
        width: 90%;
        max-width: 400px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Sistem Manajemen Ketersediaan</h1>

      <div id="error-msg"></div>

      <form id="itemForm" class="form-grid">
        <div class="input-group">
          <label for="nama">Nama Barang</label>
          <input type="text" id="nama" placeholder="Contoh: Laptop" required />
        </div>
        <div class="input-group">
          <label for="stok">Stok Awal</label>
          <input type="number" id="stok" min="0" value="0" required />
        </div>
        <div class="input-group">
          <label for="defect">Defect (Cacat)</label>
          <input type="number" id="defect" min="0" value="0" required />
        </div>
        <div class="input-group">
          <label for="hilang">Hilang</label>
          <input type="number" id="hilang" min="0" value="0" required />
        </div>
        <button type="submit" class="btn-primary">Tambah Barang</button>
      </form>

      <div class="table-responsive">
        <table id="inventoryTable">
          <thead>
            <tr>
              <th>Nama Barang</th>
              <th>Stok</th>
              <th>Defect</th>
              <th>Hilang</th>
              <th>Total Tersedia</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="modal-overlay" id="deleteModal">
      <div class="modal-content">
        <h3 style="margin-bottom: 10px">Konfirmasi Hapus</h3>
        <p>
          Apakah Anda yakin ingin menghapus
          <strong id="deleteItemName"></strong> dari sistem? Tindakan ini tidak
          dapat dibatalkan.
        </p>
        <div class="modal-actions">
          <button class="btn-secondary" onclick="closeModal()">Batal</button>
          <button class="btn-danger" onclick="executeDelete()">
            Ya, Hapus
          </button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
